apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: posting-route
  namespace: {{ $.Values.namespace }}
spec:
  parentRefs:
    - name: gateway-shared-public
      namespace: kube-system
      sectionName: https-ost
  hostnames:
    - {{ $.Values.ingress_fqdn }}
  rules:
    - backendRefs:
        - name: ganglion
          port: 80